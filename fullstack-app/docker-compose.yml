services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fullstack-postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fullstack-net

  # ── Redis Cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fullstack-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fullstack-net

  # ── Python Flask Backend ────────────────────────────────────────────────────
  python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: fullstack-python
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASS: apppass
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fullstack-net

  # ── Java Web Backend ────────────────────────────────────────────────────────
  java-backend:
    build:
      context: ./java-backend
      dockerfile: Dockerfile
    container_name: fullstack-java
    ports:
      - "8080:8080"
    networks:
      - fullstack-net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: fullstack-nginx
    ports:
      - "80:80"
    depends_on:
      - python-backend
      - java-backend
    networks:
      - fullstack-net

volumes:
  pgdata:

networks:
  fullstack-net:
    driver: bridge
