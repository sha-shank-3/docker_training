upstream java_backend {
    server java-backend:8080;
}

upstream python_backend {
    server python-backend:5000;
}

server {
    listen 80;
    server_name localhost;

    # Python backend — Task Manager (default landing page)
    location / {
        proxy_pass http://python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Java backend — Dashboard
    location /java/ {
        rewrite ^/java/(.*)$ /$1 break;
        proxy_pass http://java_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Java API / health
    location /java/api/ {
        rewrite ^/java/(.*)$ /$1 break;
        proxy_pass http://java_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /java/health {
        rewrite ^/java/(.*)$ /$1 break;
        proxy_pass http://java_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Python API endpoints (explicit for clarity)
    location /api/ {
        proxy_pass http://python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Nginx health check
    location /nginx-health {
        return 200 '{"status":"healthy","server":"nginx"}';
        add_header Content-Type application/json;
    }
}
