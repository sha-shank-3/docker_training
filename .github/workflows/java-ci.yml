name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
    paths:
      - "java-app/**"
      - ".github/workflows/java-ci.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "java-app/**"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ "17", "21" ]   # test against multiple Java versions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
          cache: maven            # caches ~/.m2 automatically

      - name: Build with Maven
        working-directory: java-app
        run: mvn --batch-mode compile

      - name: Run unit tests
        working-directory: java-app
        run: mvn --batch-mode test

      - name: Upload test report
        if: always()              # upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-report-java-${{ matrix.java }}
          path: java-app/target/surefire-reports/

      - name: Package JAR
        working-directory: java-app
        run: mvn --batch-mode package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app-jar-${{ matrix.java }}
          path: java-app/target/*.jar

  # ── Build Docker image containing the JAR ───────────────────────────────────
  docker-build:
    name: Build Docker Image with JAR
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Package JAR
        working-directory: java-app
        run: mvn --batch-mode package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with JAR
        run: docker build -f java-app/Dockerfile -t java-app:${{ github.sha }} java-app/

      - name: Run Java app inside container
        run: docker run --rm java-app:${{ github.sha }}

  # ── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    if: always()

    steps:
      - name: Post summary
        run: |
          echo "## Java CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
