name: "Pipeline 1: CI/CD - Build, Test & Deploy"

# ── When does this pipeline run? ──────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
    paths:
      - "java-web-app/**"
      - ".github/workflows/pipeline-cicd.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "java-web-app/**"
  workflow_dispatch:           # allows manual trigger from GitHub Actions UI

# ── Pipeline Jobs ─────────────────────────────────────────────────────────────
jobs:

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 1: BUILD — Compile the Java application                            ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  build:
    name: "Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compile the application
        working-directory: java-web-app
        run: mvn --batch-mode compile

      - name: Package as JAR
        working-directory: java-web-app
        run: mvn --batch-mode package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-web-app-jar
          path: java-web-app/target/*.jar
          retention-days: 7

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 2: TEST — Run unit tests                                           ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: build             # runs only after build succeeds

    strategy:
      matrix:
        java: [ "17", "21" ]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
          cache: maven

      - name: Run unit tests
        working-directory: java-web-app
        run: mvn --batch-mode test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-java-${{ matrix.java }}
          path: java-web-app/target/surefire-reports/

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 3: DEPLOY — Build Docker image and run locally to verify           ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  deploy:
    name: "Deploy (Docker)"
    runs-on: ubuntu-latest
    needs: test              # runs only after all tests pass

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Package JAR
        working-directory: java-web-app
        run: mvn --batch-mode package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: java-web-app
          push: false
          load: true
          tags: java-web-app:${{ github.sha }}

      - name: Start container
        run: |
          docker run -d --name test-app -p 8080:8080 java-web-app:${{ github.sha }}
          sleep 3

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed!"
            docker logs test-app
            exit 1
          fi
          echo "Health check passed!"

      - name: Show app response
        run: |
          echo "=== Home Page ==="
          curl -s http://localhost:8080 | head -5
          echo ""
          echo "=== Health Endpoint ==="
          curl -s http://localhost:8080/health
          echo ""
          echo "=== API Info ==="
          curl -s http://localhost:8080/api/info

      - name: Cleanup container
        if: always()
        run: docker stop test-app && docker rm test-app

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  SUMMARY — Post results to GitHub Actions UI                            ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [build, test, deploy]
    if: always()

    steps:
      - name: Post summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test  | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
