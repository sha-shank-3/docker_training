name: "Pipeline 2: Docker Build & Push to Docker Hub"

# ── When does this pipeline run? ──────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
    paths:
      - "java-web-app/**"
      - ".github/workflows/pipeline-docker-push.yml"
  workflow_dispatch:           # allows manual trigger

# ── Environment variables ─────────────────────────────────────────────────────
env:
  DOCKERHUB_USERNAME: shashank391999
  IMAGE_NAME: shashank391999/java-web-app

# ── Pipeline Jobs ─────────────────────────────────────────────────────────────
jobs:

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 1: TEST — Make sure code is healthy before building image           ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run unit tests
        working-directory: java-web-app
        run: mvn --batch-mode test

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 2: BUILD & PUSH — Build Docker image and push to Docker Hub        ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  build-and-push:
    name: "Build & Push to Docker Hub"
    runs-on: ubuntu-latest
    needs: test               # only push if tests pass

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Log in to Docker Hub using secrets ──────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Generate smart tags (sha, branch, latest) ──────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest

      # ── Build and push the image ────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: java-web-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 3: VERIFY — Pull the pushed image and run smoke test               ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  verify:
    name: "Verify Pushed Image"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Pull image from Docker Hub
        run: docker pull ${{ env.IMAGE_NAME }}:latest

      - name: Start container
        run: |
          docker run -d --name verify-app -p 8080:8080 ${{ env.IMAGE_NAME }}:latest
          sleep 3

      - name: Test container is working
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Verification failed!"
            docker logs verify-app
            exit 1
          fi
          echo "Image verified on Docker Hub!"
          curl -s http://localhost:8080/health

      - name: Cleanup
        if: always()
        run: docker stop verify-app && docker rm verify-app

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  SUMMARY ─ Post results                                                 ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [test, build-and-push, verify]
    if: always()

    steps:
      - name: Post summary
        run: |
          echo "## Docker Build & Push Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Pull:** \`docker pull ${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
